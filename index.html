<div id="feed"></div>
<script>
fetch("https://api.rss2json.com/v1/api.json?rss_url=https://www.lemonde.fr/rss/une.xml")
  .then(r => r.json())
  .then(data => {
    document.getElementById("feed").innerHTML = data.items.slice(0, 10).map(i =>
      `<div style="padding:12px 0;border-bottom:1px solid #ccc;">
        <b style="font-size:22px;line-height:1.4;">${i.title}</b>
      </div>`
    ).join("");
  });
</script>
